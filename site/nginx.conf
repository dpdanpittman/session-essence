server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache
    location ~* ^/essence/.*\.(?:css|js|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp|avif|map)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # HTML pages — fall back to index for trailing-slash variants
    location /essence/ {
        try_files $uri $uri/ /essence/index.html;
        add_header Cache-Control "no-cache";
    }

    # Bare /essence (no trailing slash) — serve index directly
    location = /essence {
        try_files /essence/index.html =404;
    }

    # Health probe
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
